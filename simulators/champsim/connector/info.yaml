name: mcp
protocol: mcp
description: |
  Streamable HTTP MCP server that bridges agents and the harness/simulator.
  Tools: submit, submit_and_wait, check_submission, session_end,
  browse_simulator, read_simulator_file.
  See simulators/champsim/connector/tool_schema.py for the canonical tool list -- agents
  acting as MCP clients MUST discover tools via tools/list rather than
  hardcoding them.
default_port_range: [35000, 49000]
log_path_pattern: "<results_dir>/mcp.log"
supported_tools:
  - submit
  - submit_and_wait
  - check_submission
  - session_end
  - browse_simulator
  - read_simulator_file
